version: '3.9'

services:


  neo4j:
    image: neo4j:5.15-community
    container_name: devdeck-neo4j
    restart: unless-stopped
    ports:
      - '7474:7474'   # Neo4j Browser UI
      - '7687:7687'   # Bolt protocol
    volumes:
      - neo4j_data:/data
    environment:
      NEO4J_AUTH: neo4j/devdeck123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devdeck-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    depends_on:
      - neo4j
    env_file:
      - ./backend/.env
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: devdeck123
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devdeck-frontend
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_BACKEND_URL: http://backend:5000
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  neo4j_data:
